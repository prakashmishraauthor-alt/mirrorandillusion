<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">

<title>Happiness Index Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1c;
    color: #e5e7eb;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: 50px auto;
    background: #111827;
    padding: 25px;
    border-radius: 12px;
}

/* TITLE */
h1 {
    text-align: center;
    color: #ffd700;
}

/* QUESTION */
.question {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
}

/* SELECT */
select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: #fff;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #ffd700;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    color: #000;
}

/* RESULT */
.result {
    margin-top: 20px;
    padding: 20px;
    background: #020617;
    border-radius: 10px;
    display: none;
    text-align: center;
}

.score {
    font-size: 26px;
    color: #ffd700;
}
</style>
</head>

<body>

<div class="container">

<h1>😊 Happiness Index</h1>

<div class="question">
<label>How satisfied are you with your life?</label>
<select id="q1">
<option value="10">Very satisfied</option>
<option value="7">Somewhat satisfied</option>
<option value="4">Neutral</option>
<option value="0">Not satisfied</option>
</select>
</div>

<div class="question">
<label>How often do you feel stressed?</label>
<select id="q2">
<option value="0">Very often</option>
<option value="5">Sometimes</option>
<option value="10">Rarely</option>
</select>
</div>

<div class="question">
<label>Do you feel your life has purpose?</label>
<select id="q3">
<option value="10">Yes</option>
<option value="5">Somewhat</option>
<option value="0">No</option>
</select>
</div>

<div class="question">
<label>How is your mental clarity?</label>
<select id="q4">
<option value="10">Clear</option>
<option value="5">Average</option>
<option value="0">Confused</option>
</select>
</div>

<div class="question">
<label>How connected do you feel with yourself?</label>
<select id="q5">
<option value="10">Very connected</option>
<option value="5">Somewhat</option>
<option value="0">Disconnected</option>
</select>
</div>

<button onclick="calculate()">Check Happiness</button>

<div class="result" id="resultBox">
<div class="score" id="score"></div>
<p id="status"></p>
<p id="advice"></p>
</div>

</div>

<div class="cta-box">
  <h3>Get Your Full Reset Plan</h3>
  <p>Receive a personalized 7-day biological reset system.</p>

   <form id="planForm" action="https://formspree.io/f/xzdjnzbn" method="POST">
    
    <input type="email" name="email" placeholder="Enter your email" required>

    <button type="submit">Get My Plan</button>

</form>

<script>
document.getElementById("planForm").addEventListener("submit", function(e){

e.preventDefault(); // stop default form

let form = this;
let data = new FormData(form);

// send data to Formspree
fetch(form.action, {
    method: form.method,
    body: data,
    headers: {
        'Accept': 'application/json'
    }
}).then(response => {

    if(response.ok){
        // ✅ REDIRECT MANUALLY
        window.location.href = "happiness-plan.html";
    } else {
        alert("Something went wrong. Try again.");
    }

});
});
</script>
</div>

<script>

function calculate(){

let total =
+q1.value + +q2.value + +q3.value + +q4.value + +q5.value;

resultBox.style.display = "block";
score.innerText = "Happiness Score: " + total + "/50";

let status = "";
let advice = "";

if(total < 15){
status = "Low Happiness";
advice = "You need a reset. Start with small habits and reduce stress triggers.";
}
else if(total < 30){
status = "Moderate Happiness";
advice = "You are stable but need clarity and direction.";
}
else if(total < 45){
status = "Good Happiness";
advice = "You are doing well. Maintain your routines.";
}
else{
status = "High Happiness";
advice = "You are aligned. Keep growing.";
}

document.getElementById("status").innerText = status;
document.getElementById("advice").innerText = advice;

}

</script>

</body>
</html>
