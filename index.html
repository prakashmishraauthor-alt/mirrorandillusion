<body class="consciousness">

<div class="field"></div>
<div class="breath-layer"></div>

<header class="header">
  <div class="logo">◉ MIRROR & ILLUSION</div>
  <button class="audio">Sound</button>
</header>

<main>

<section class="state state-entry" data-state="entry">
  <h1>You are not reading.</h1>
  <p>You are shifting awareness.</p>
</section>

<section class="state state-observe" data-state="observe">
  <h2>Observe Thought</h2>
  <p>Thought appears. You are not it.</p>
</section>

<section class="state state-reflect" data-state="reflect">
  <h2>Mirror State</h2>
  <blockquote>
    Everything you see is your inner projection.
  </blockquote>
</section>

<section class="state state-dissolve" data-state="dissolve">
  <h2>Dissolution</h2>
  <p>Identity becomes soft. Awareness expands.</p>
</section>

<section class="state state-return" data-state="return">
  <h2>Return</h2>
  <p>You were always here.</p>
</section>

</main>

<audio id="ambience" loop>

</audio>
