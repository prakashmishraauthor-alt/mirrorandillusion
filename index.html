<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mirror & Illusion</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#4A2C21;

    color:#fff;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:'Cinzel',serif;

}

.hero{

    text-align:center;

    padding:20px;

}

h1{

    font-size:clamp(3rem,8vw,6rem);

    letter-spacing:8px;

    color:#f5f5f5;

    text-shadow:
        0 0 20px rgba(255,255,255,.12);

}

.subtitle{

    margin-top:20px;

    color:#9d9d9d;

    font-size:1.2rem;

    letter-spacing:3px;

}

.enter-btn{

    display:inline-block;

    margin-top:70px;

    padding:18px 55px;

    background:#d97706;

    color:#fff;

    text-decoration:none;

    font-size:1.15rem;

    letter-spacing:4px;

    border-radius:6px;

    transition:.3s;

    box-shadow:
        0 0 25px rgba(217,119,6,.45);

}

.enter-btn:hover{

    background:#f59e0b;

    transform:translateY(-4px);

    box-shadow:
        0 0 40px rgba(245,158,11,.8);

}

</style>

</head>

<body>

<div class="hero">

    <h1>Mirror &amp; Illusion</h1>

    <p class="subtitle">
        Enter the Hall of Ancient Wisdom
    </p>

    <!-- Change hall-of-cards.html to your actual cards page -->
    <a href="museum-interior.html" class="enter-btn">
        ENTER
    </a>

</div>

</body>
</html>
