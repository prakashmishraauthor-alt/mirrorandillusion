```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mirror & Illusion</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top,
#2b1d14 0%,
#16110d 45%,
#090807 100%);

color:#f7f1e3;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

overflow:hidden;

}

.hero{

width:100%;
max-width:900px;
text-align:center;

}

h1{

font-family:'Cinzel',serif;

font-size:clamp(3rem,8vw,6rem);

font-weight:700;

letter-spacing:5px;

line-height:1.1;

color:#d8b15a;

text-shadow:
0 0 15px rgba(216,177,90,.25);

margin-bottom:40px;

}

.subtitle{

max-width:700px;

margin:auto;

font-size:clamp(1.05rem,2vw,1.35rem);

line-height:2;

color:#d8cdb8;

margin-bottom:55px;

}

.enter{

display:inline-block;

padding:18px 60px;

background:linear-gradient(180deg,#d8b15a,#b7892f);

color:#111;

font-family:'Cinzel',serif;

font-size:1rem;

font-weight:700;

letter-spacing:3px;

text-decoration:none;

border-radius:12px;

box-shadow:
0 0 30px rgba(216,177,90,.35);

transition:.35s;

}

.enter:hover{

transform:translateY(-4px);

box-shadow:
0 0 45px rgba(216,177,90,.6);

}

@media(max-width:768px){

body{

padding:25px;

}

h1{

font-size:3rem;

letter-spacing:2px;

margin-bottom:30px;

}

.subtitle{

font-size:1.05rem;

line-height:1.8;

margin-bottom:40px;

}

.enter{

display:block;

width:100%;

padding:18px;

}

}

</style>

</head>

<body>

<section class="hero">

<h1>

MIRROR<br>

AND<br>

ILLUSION

</h1>

<p class="subtitle">

Throughout history, seekers from different paths pointed toward the same timeless truth.
Their methods differ, but their destination is one.

</p>

<a class="enter" href="ancient-wisdom.html">

ENTER THE ARCHIVE

</a>

</section>

</body>

</html>
