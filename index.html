<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror and Illusion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 .hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.hero-card{

    width:min(900px,90vw);

    padding:80px 60px;

    text-align:center;

    background:
    linear-gradient(
    135deg,
    rgba(255,220,150,0.06),
    rgba(255,220,150,0.02));

    border:1px solid rgba(212,175,55,0.25);

    border-radius:24px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(212,175,55,0.08),
    inset 0 0 30px rgba(212,175,55,0.03);

    position:relative;
}

.hero-card::before{

    content:"✦";

    position:absolute;

    top:20px;
    left:30px;

    color:rgba(212,175,55,0.5);

    font-size:1.2rem;
}

.hero-card::after{

    content:"✦";

    position:absolute;

    bottom:20px;
    right:30px;

    color:rgba(212,175,55,0.5);

    font-size:1.2rem;
}

.hero-title{

    font-family:'Cinzel',serif;

    font-size:5rem;

    color:#d4af37;

    line-height:1.05;

    letter-spacing:3px;

    margin-bottom:35px;

    text-shadow:
    0 0 15px rgba(212,175,55,0.25),
    0 0 35px rgba(212,175,55,0.12);
}

.hero-subtitle{

    max-width:650px;

    margin:0 auto 50px;

    font-size:1.3rem;

    line-height:2;

    color:#cdbfa6;
}

.enter-btn{

    display:inline-block;

    padding:18px 55px;

    text-decoration:none;

    font-family:'Cinzel',serif;

    letter-spacing:3px;

    color:#fff4d2;

    border:1px solid #d4af37;

    border-radius:8px;

    background:
    linear-gradient(
    135deg,
    rgba(212,175,55,0.15),
    rgba(212,175,55,0.05));

    box-shadow:
    0 0 20px rgba(212,175,55,0.25);

    transition:.4s;
}

.enter-btn:hover{

    transform:translateY(-4px);

    box-shadow:
    0 0 35px rgba(212,175,55,0.45),
    0 0 60px rgba(212,175,55,0.25);

    background:
    linear-gradient(
    135deg,
    rgba(212,175,55,0.25),
    rgba(212,175,55,0.12));
}

@media(max-width:768px){

.hero-card{
padding:50px 30px;
}

.hero-title{
font-size:3rem;
}

.hero-subtitle{
font-size:1.1rem;
}

}
</style>
</head>
<body>
 <section class="hero">

    <div class="hero-card">

        <h1 class="hero-title">
            MIRROR AND<br>ILLUSION
        </h1>

        <p class="hero-subtitle">
            Throughout history, seekers from different paths
            pointed toward the same timeless truth.
            Their methods differ, but their destination is one.
        </p>

        <a href="ancient-wisdom.html" class="enter-btn">
            ENTER THE ARCHIVE
        </a>

    </div>

</section>
</body>
</html>
