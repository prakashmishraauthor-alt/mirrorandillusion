<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter the Magical Museum</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html {
      height: 100%;
      font-family: 'Georgia', serif;
      overflow: hidden;
      background: #000;
    }
    
    .hero {
      /* Use the FULL image I generated - wizard + button already in it */
      background: url('museum-bg.jpg') no-repeat center center;
      background-size: cover;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
    }
    
    /* Invisible clickable area where the ENTER button is in your image */
    .enter-area {
      position: absolute;
      /* Adjust these values to match where ENTER button is in your image */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;  /* Make this match your button width */
      height: 90px;  /* Make this match your button height */
      cursor: pointer;
      z-index: 10;
      /* Subtle hover glow to show it's clickable */
      transition: all 0.3s ease;
    }
    
    .enter-area:hover {
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.6);
      border-radius: 12px;
    }
    
    /* Floating candle particles on top of image */
    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow: 0 0 15px #FFD700;
      animation: float 10s infinite ease-in-out;
      opacity: 0;
      pointer-events: none;
    }
    
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) translateX(30px) scale(1.2); opacity: 0; }
    }
    
    .particle:nth-child(1) { left: 15%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; animation-delay: 2s; }
    .particle:nth-child(3) { left: 45%; animation-delay: 4s; }
    .particle:nth-child(4) { left: 60%; animation-delay: 1s; }
    .particle:nth-child(5) { left: 75%; animation-delay: 3s; }
    .particle:nth-child(6) { left: 85%; animation-delay: 5s; }
  </style>
</head>
<body>
  <div class="hero" onclick="enterMuseum()">
    <!-- Floating candle particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <!-- Invisible clickable zone over the ENTER button in your image -->
    <div class="enter-area" title="Enter the Museum"></div>
  </div>

  <script>
    function enterMuseum() {
      document.body.style.transition = 'opacity 1.2s ease';
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'museum-interior.html'; // Change to your next page
      }, 1200);
    }
  </script>
</body>
</html>
