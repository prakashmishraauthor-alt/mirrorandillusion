<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror and Illusion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #2a1f1a;
    --bg-warm: #3a2f28;
    --gold-muted: #c9a961;
    --gold-text: #d4b87a;
    --text-soft: #9d8b7a;
    --text-dim: #7a6b5d;
  }

    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--bg-deep);
    background-image: 
      radial-gradient(ellipse at top, var(--bg-warm) 0%, transparent 70%);
    color: var(--gold-text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
    position: relative;
  }

  /* Subtle vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }

  .hero {
    text-align: center;
    padding: 40px 20px;
    position: relative;
    z-index: 10;
    max-width: 900px;
    animation: fadeIn 1.5s ease-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 600;
    letter-spacing: 10px;
    color: var(--gold-muted);
    text-transform: uppercase;
    line-height: 1.3;
    margin-bottom: 35px;
  }

  .description {
    color: var(--text-soft);
    font-size: clamp(1rem, 2vw, 1.15rem);
    font-weight: 400;
    letter-spacing: 0.5px;
    line-height: 1.8;
    max-width: 700px;
    margin: 0 auto 60px;
  }

  .enter-btn {
    display: inline-block;
    padding: 16px 50px;
    background: transparent;
    color: var(--gold-text);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    border: 1px solid rgba(201, 169, 97, 0.3);
    border-radius: 2px;
    transition: all 0.35s ease;
    position: relative;
  }

  .enter-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, 
      rgba(201, 169, 97, 0.1), 
      rgba(201, 169, 97, 0.05)
    );
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .enter-btn:hover {
    border-color: rgba(201, 169, 97, 0.6);
    color: var(--gold-muted);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
  }

  .enter-btn:hover::before {
    opacity: 1;
  }

  /* Mobile */
  @media (max-width: 768px) {
    h1 { 
      letter-spacing: 5px; 
      font-size: clamp(2rem, 8vw, 3rem);
      margin-bottom: 25px;
    }
    .description { 
      font-size: 0.95rem;
      margin-bottom: 45px;
      padding: 0 10px;
    }
    .enter-btn { 
      padding: 14px 40px; 
      letter-spacing: 3px;
      font-size: 0.85rem;
    }
  }
</style>
</head>
<body>
  <div class="hero">
    <h1>Mirror and Illusion</h1>
    <p class="description">
      Throughout history, seekers from different paths pointed toward the same timeless truth. 
      Their methods differ, but their destination is one.
    </p>
    <a href="ancient-wisdom.html" class="enter-btn">Enter the Archive</a>
  </div>
</body>
</html>
